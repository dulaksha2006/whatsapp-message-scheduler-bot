<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WA Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" />
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222e;
    --border: #2a2a38;
    --accent: #25d366;
    --accent2: #128c7e;
    --accent-glow: rgba(37,211,102,0.15);
    --red: #ff4757;
    --yellow: #ffd32a;
    --blue: #70a1ff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .status-badge { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 100px; background: var(--surface2); border: 1px solid var(--border); font-family: var(--mono); font-size: 12px; transition: all 0.3s; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-badge.connected { border-color: var(--accent); background: var(--accent-glow); }
  .status-badge.connected .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  .status-badge.qr .status-dot { background: var(--yellow); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  .header-actions { display: flex; align-items: center; gap: 10px; }
  .btn-disconnect { padding: 7px 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-disconnect:hover { border-color: var(--red); color: var(--red); }
  .btn-disconnect.visible { display: block; }

  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat-card { background: var(--surface); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .stat-icon.green { background: rgba(37,211,102,0.1); }
  .stat-icon.blue { background: rgba(112,161,255,0.1); }
  .stat-icon.red { background: rgba(255,71,87,0.1); }
  .stat-num { font-size: 28px; font-weight: 800; font-family: var(--mono); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .main { display: grid; grid-template-columns: 380px 1fr; flex: 1; }
  .left-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; }

  .qr-section { padding: 28px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 220px; justify-content: center; }
  .qr-frame { border: 2px solid var(--accent); border-radius: 12px; padding: 8px; background: white; box-shadow: 0 0 30px var(--accent-glow); }
  .qr-frame img { display: block; border-radius: 4px; }
  .qr-hint { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }
  .connected-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-glow); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; }
  .connected-name { font-size: 16px; font-weight: 700; text-align: center; }
  .connected-phone { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 4px; text-align: center; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .form-section { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; background: var(--surface); }
  .section-title { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .field input, .field textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input[type="datetime-local"] { color-scheme: dark; }
  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 11px 16px; border-radius: 8px; border: none; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #1db954; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(37,211,102,0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); flex: 0 0 auto; padding: 11px 14px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .right-panel { display: flex; flex-direction: column; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab { padding: 16px 20px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge { background: var(--surface3); color: var(--muted); border-radius: 100px; padding: 2px 8px; font-family: var(--mono); font-size: 11px; min-width: 20px; text-align: center; }
  .tab.active .tab-badge { background: var(--accent-glow); color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }
  .messages-list { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .messages-list::-webkit-scrollbar { width: 4px; }
  .messages-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: flex-start; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-status-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .msg-status-icon.pending { background: rgba(255,211,42,0.1); }
  .msg-status-icon.sent { background: rgba(37,211,102,0.1); }
  .msg-status-icon.failed { background: rgba(255,71,87,0.1); }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .msg-phone { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); }
  .msg-label { font-size: 11px; padding: 2px 8px; border-radius: 100px; background: var(--surface2); color: var(--muted); font-family: var(--mono); }
  .msg-time { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  .msg-text { font-size: 13px; color: var(--text); line-height: 1.5; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .msg-countdown { font-family: var(--mono); font-size: 11px; color: var(--yellow); margin-top: 6px; }
  .msg-error { font-family: var(--mono); font-size: 11px; color: var(--red); margin-top: 4px; }
  .msg-actions { display: flex; gap: 6px; align-items: flex-start; }
  .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--red); color: var(--red); background: rgba(255,71,87,0.1); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; color: var(--muted); gap: 12px; text-align: center; }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-family: var(--mono); font-size: 12px; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease; min-width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--blue); }
  @keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

  .history-bar { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: flex-end; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .stats-bar { grid-template-columns: 1fr; }
    .form-section, .qr-section { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">WA<span>Scheduler</span></div>
  </div>
  <div class="header-actions">
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <button class="btn-disconnect" id="disconnectBtn" onclick="doDisconnect()">Disconnect</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-icon green">⏰</div>
    <div><div class="stat-num" id="statScheduled">0</div><div class="stat-label">Scheduled</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon blue">✅</div>
    <div><div class="stat-num" id="statSent">0</div><div class="stat-label">Sent</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon red">❌</div>
    <div><div class="stat-num" id="statFailed">0</div><div class="stat-label">Failed</div></div>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="qr-section" id="qrSection">
      <div class="spinner"></div>
      <div class="qr-hint">Initializing...</div>
    </div>

    <div class="form-section">
      <div class="section-title">Schedule Message</div>
      <div class="field">
        <label>Phone Number (with country code)</label>
        <input type="tel" id="fPhone" placeholder="94771234567" />
      </div>
      <div class="field">
        <label>Label (optional)</label>
        <input type="text" id="fLabel" placeholder="Birthday wish, Reminder..." />
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="fMessage" placeholder="Type your message here..."></textarea>
      </div>
      <div class="field">
        <label>Send At</label>
        <input type="datetime-local" id="fDateTime" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="scheduleBtn" onclick="scheduleMessage()" disabled>⏰ Schedule</button>
        <button class="btn btn-secondary" title="Send Now (instant)" onclick="sendNow()">⚡</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('Scheduled')">Scheduled <span class="tab-badge" id="tabBadgeScheduled">0</span></div>
      <div class="tab" onclick="switchTab('Sent')">Sent <span class="tab-badge" id="tabBadgeSent">0</span></div>
      <div class="tab" onclick="switchTab('Failed')">Failed <span class="tab-badge" id="tabBadgeFailed">0</span></div>
    </div>

    <div class="tab-content active" id="tabScheduled">
      <div class="messages-list" id="listScheduled">
        <div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No scheduled messages yet.</div></div>
      </div>
    </div>

    <div class="tab-content" id="tabSent">
      <div class="history-bar">
        <button class="btn btn-secondary" style="flex:0;padding:6px 14px;font-size:12px;" onclick="clearHistory()">🗑 Clear History</button>
      </div>
      <div class="messages-list" id="listSent">
        <div class="empty-state"><div class="empty-icon">📤</div><div class="empty-text">No messages sent yet.</div></div>
      </div>
    </div>

    <div class="tab-content" id="tabFailed">
      <div class="messages-list" id="listFailed">
        <div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">No failed messages!</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const socket = io();
let scheduledData = [], sentData = [], failedData = [];
let countdownTimers = {};

// ── Socket ──────────────────────────────────────────────────────────────────
socket.on('status', ({ state, message }) => setStatus(state, message));

socket.on('qr', ({ qr }) => {
  document.getElementById('qrSection').innerHTML = `
    <div class="qr-frame"><img src="${qr}" width="160" height="160" alt="QR" /></div>
    <div class="qr-hint">Open <strong>WhatsApp</strong> → Linked Devices<br/>→ Link a Device → Scan QR</div>`;
  setStatus('qr', 'Scan QR code');
});

socket.on('connected', ({ phone, name }) => {
  document.getElementById('qrSection').innerHTML = `
    <div class="connected-avatar">📱</div>
    <div class="connected-name">${esc(name || 'Connected')}</div>
    <div class="connected-phone">+${phone}</div>`;
  document.getElementById('scheduleBtn').disabled = false;
  document.getElementById('disconnectBtn').classList.add('visible');
  toast('✅ WhatsApp connected!', 'success');
});

socket.on('schedule_update', (data) => {
  scheduledData = (data || []).filter(m => m.status === 'pending');
  failedData = (data || []).filter(m => m.status === 'failed');
  renderScheduled(); renderFailed(); updateStats();
});

socket.on('sent_update', (data) => { sentData = data || []; renderSent(); updateStats(); });
socket.on('message_sent', (m) => toast(`✅ Sent to +${m.phone}`, 'success'));
socket.on('message_failed', (m) => toast(`❌ Failed: ${m.error}`, 'error'));

// ── Status ──────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  badge.className = `status-badge ${state}`;
  text.textContent = msg || state;
  if (state !== 'connected') {
    document.getElementById('disconnectBtn').classList.remove('visible');
    document.getElementById('scheduleBtn').disabled = true;
  }
  if (state === 'disconnected') {
    document.getElementById('qrSection').innerHTML = `<div class="spinner"></div><div class="qr-hint">Reconnecting...</div>`;
  }
}

// ── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById(`tab${name}`).classList.add('active');
}

// ── Render ──────────────────────────────────────────────────────────────────
function renderScheduled() {
  clearCountdowns();
  const list = document.getElementById('listScheduled');
  const badge = document.getElementById('tabBadgeScheduled');
  badge.textContent = scheduledData.length;
  if (!scheduledData.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No scheduled messages yet.<br/>Add one using the form.</div></div>`;
    return;
  }
  list.innerHTML = scheduledData.sort((a,b) => new Date(a.scheduledAt)-new Date(b.scheduledAt)).map(m => `
    <div class="msg-card" id="card-${m.id}">
      <div class="msg-status-icon pending">⏰</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-phone">+${esc(m.phone)}</span>
          ${m.label ? `<span class="msg-label">${esc(m.label)}</span>` : ''}
          <span class="msg-time">${fmtDT(m.scheduledAt)}</span>
        </div>
        <div class="msg-text">${esc(m.message)}</div>
        <div class="msg-countdown" id="cd-${m.id}"></div>
      </div>
      <div class="msg-actions">
        <button class="btn-icon" onclick="deleteMsg('${m.id}')" title="Cancel">🗑</button>
      </div>
    </div>`).join('');
  scheduledData.forEach(m => startCountdown(m));
}

function renderSent() {
  const list = document.getElementById('listSent');
  document.getElementById('tabBadgeSent').textContent = sentData.length;
  if (!sentData.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📤</div><div class="empty-text">No messages sent yet.</div></div>`;
    return;
  }
  list.innerHTML = sentData.map(m => `
    <div class="msg-card">
      <div class="msg-status-icon sent">✅</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-phone">+${esc(m.phone)}</span>
          ${m.label ? `<span class="msg-label">${esc(m.label)}</span>` : ''}
          <span class="msg-time">${fmtDT(m.sentAt)}</span>
        </div>
        <div class="msg-text">${esc(m.message)}</div>
      </div>
    </div>`).join('');
}

function renderFailed() {
  const list = document.getElementById('listFailed');
  document.getElementById('tabBadgeFailed').textContent = failedData.length;
  if (!failedData.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">No failed messages. All good!</div></div>`;
    return;
  }
  list.innerHTML = failedData.map(m => `
    <div class="msg-card">
      <div class="msg-status-icon failed">❌</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-phone">+${esc(m.phone)}</span>
          <span class="msg-time">${fmtDT(m.scheduledAt)}</span>
        </div>
        <div class="msg-text">${esc(m.message)}</div>
        ${m.error ? `<div class="msg-error">⚠ ${esc(m.error)}</div>` : ''}
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('statScheduled').textContent = scheduledData.length;
  document.getElementById('statSent').textContent = sentData.length;
  document.getElementById('statFailed').textContent = failedData.length;
}

// ── Countdown ────────────────────────────────────────────────────────────────
function startCountdown(msg) {
  const el = document.getElementById(`cd-${msg.id}`);
  if (!el) return;
  const tick = () => {
    const diff = new Date(msg.scheduledAt) - new Date();
    el.textContent = diff <= 0 ? '⏳ Sending...' : `⏳ ${fmtCd(diff)}`;
  };
  tick();
  countdownTimers[msg.id] = setInterval(tick, 1000);
}
function clearCountdowns() { Object.values(countdownTimers).forEach(clearInterval); countdownTimers = {}; }
function fmtCd(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ${h%24}h ${m%60}m`;
  if (h > 0) return `${h}h ${m%60}m ${s%60}s`;
  if (m > 0) return `${m}m ${s%60}s`;
  return `${s}s`;
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function scheduleMessage() {
  const phone = document.getElementById('fPhone').value.trim();
  const message = document.getElementById('fMessage').value.trim();
  const scheduledAt = document.getElementById('fDateTime').value;
  const label = document.getElementById('fLabel').value.trim();
  if (!phone || !message || !scheduledAt) { toast('Fill all required fields', 'error'); return; }
  if (new Date(scheduledAt) <= new Date()) { toast('Select a future date/time', 'error'); return; }
  const btn = document.getElementById('scheduleBtn');
  btn.disabled = true; btn.textContent = 'Scheduling...';
  try {
    const res = await fetch('/api/schedule', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ phone, message, scheduledAt, label }) });
    const data = await res.json();
    if (data.success) {
      toast('⏰ Message scheduled!', 'success');
      ['fPhone','fMessage','fLabel','fDateTime'].forEach(id => document.getElementById(id).value = '');
      document.querySelectorAll('.tab')[0].click();
    } else toast(data.error || 'Failed', 'error');
  } catch { toast('Network error', 'error'); }
  btn.disabled = false; btn.innerHTML = '⏰ Schedule';
}

async function sendNow() {
  const phone = document.getElementById('fPhone').value.trim();
  const message = document.getElementById('fMessage').value.trim();
  if (!phone || !message) { toast('Fill phone and message', 'error'); return; }
  const res = await fetch('/api/send-now', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ phone, message }) });
  const data = await res.json();
  if (data.success) { toast('⚡ Sent immediately!', 'success'); document.querySelectorAll('.tab')[1].click(); }
  else toast(data.error || 'Failed', 'error');
}

async function deleteMsg(id) {
  if (!confirm('Cancel this scheduled message?')) return;
  await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
}

async function clearHistory() {
  if (!confirm('Clear all sent/failed history?')) return;
  await fetch('/api/history', { method: 'DELETE' });
}

async function doDisconnect() {
  if (!confirm('Disconnect WhatsApp?')) return;
  await fetch('/api/disconnect', { method: 'POST' });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDT(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

// Set min datetime
function setMin() {
  const now = new Date(); now.setMinutes(now.getMinutes()+1);
  document.getElementById('fDateTime').min = now.toISOString().slice(0,16);
}
setMin(); setInterval(setMin, 30000);

// Initial load
fetch('/api/messages').then(r => r.json()).then(data => {
  scheduledData = (data.scheduled||[]).filter(m => m.status==='pending');
  sentData = data.sent||[];
  failedData = [...(data.scheduled||[]).filter(m => m.status==='failed'), ...(data.failed||[])];
  renderScheduled(); renderSent(); renderFailed(); updateStats();
});
</script>
